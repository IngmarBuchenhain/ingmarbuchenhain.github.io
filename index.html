<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine einfache Seite</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 2em;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            color: #0055aa;
        }
        p {
            line-height: 1.5;
        }
        a {
            color: #0055aa;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Willkommen!</h1>
    <p>Dies ist eine super simple HTML-Seite als Vorlage.</p>
    <p>Du kannst diesen Text beliebig anpassen, um mit deiner eigenen Seite zu starten.</p>
    <p><a href="#">Mehr erfahren</a></p>
</body>
</html>
